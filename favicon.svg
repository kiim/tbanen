<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="T—BANEN">

  <!-- Canvas -->
  <rect width="32" height="32" fill="#080808"/>

  <!-- Network lines — thin, off-white, infrastructural -->
  <line x1="5" y1="9"  x2="14" y2="16" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="5" y1="23" x2="14" y2="16" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="14" y1="16" x2="26" y2="16" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Secondary station nodes — white -->
  <circle cx="5"  cy="9"  r="3"   fill="#ffffff" fill-opacity="0.72"/>
  <circle cx="5"  cy="23" r="3"   fill="#ffffff" fill-opacity="0.72"/>

  <!-- Junction node — dim white -->
  <circle cx="14" cy="16" r="1.8" fill="#ffffff" fill-opacity="0.35"/>

  <!-- Primary node — Line 5 green -->
  <circle cx="26" cy="16" r="4"   fill="#3D9A5C"/>

</svg>
