<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>T—BANEN / OSLO</title>
  <meta name="theme-color" content="#080808">
  <meta name="description" content="Et fotografisk arkiv over alle stasjoner i Oslos T-banenettverk.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --sans: 'Barlow', 'Helvetica Neue', Arial, sans-serif;
      --mono: 'IBM Plex Mono', 'Courier New', Courier, monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      overflow: hidden;
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      cursor: pointer;
    }

    #c {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }

    /* ── System identifier — top left ──────────────────────────────── */
    /* Not a logo. A system label. Like a sign on a control room wall. */
    #sys-label {
      position: fixed;
      top: calc(18px + env(safe-area-inset-top, 0px));
      left: 22px;
      z-index: 10;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.26);
      pointer-events: none;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.6s ease;
    }
    .sys-line {
      width: 12px; height: 1px;
      background: currentColor;
      opacity: 0.35;
    }
    .sys-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background-color 2.4s ease;
    }

    /* ── Boot status — top right ────────────────────────────────────── */
    #boot-status {
      position: fixed;
      top: calc(18px + env(safe-area-inset-top, 0px));
      right: 22px;
      z-index: 10;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.14);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      transition: opacity 1.8s ease;
    }
    #boot-status.fade-out { opacity: 0; }
    #boot-status::after {
      content: '_';
      animation: blink 1.1s step-end infinite;
      opacity: 0.5;
    }
    @keyframes blink { 0%, 100% { opacity: 0.5; } 50% { opacity: 0; } }

    /* ── Departure board — the entry threshold ──────────────────────── */
    /* Positioned at the bottom like a platform departure sign.         */
    /* Not a button. A direction. The threshold.                        */
    #departure {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 10;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 2.4s ease, transform 2.4s ease;
      pointer-events: none;
    }
    #departure.online {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    /* The platform line — a physical threshold */
    #dep-rule {
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255,255,255,0.08) 15%,
        rgba(255,255,255,0.08) 85%,
        transparent
      );
    }

    #dep-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    }

    /* Left — system info */
    #dep-sys {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.18);
      line-height: 1.6;
      flex: 1;
    }

    /* Center — the actual destination/direction */
    #dep-cta {
      font-family: var(--sans);
      font-size: clamp(13px, 1.7vw, 19px);
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(195, 188, 175, 0.58);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.8s ease;
      white-space: nowrap;
    }
    #dep-cta:hover { color: rgba(218, 210, 197, 0.88); }
    #dep-arrow {
      opacity: 0.40;
      transition: transform 0.55s ease, opacity 0.55s ease;
    }
    #dep-cta:hover #dep-arrow {
      transform: translateX(5px);
      opacity: 0.7;
    }

    /* Right — station count */
    #dep-count {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.14);
      text-align: right;
      flex: 1;
      opacity: 0;
      transition: opacity 2.2s ease;
    }
    #dep-count.ready { opacity: 1; }

    /* ── Realtime note — small discovery ────────────────────────────── */
    #rt-note {
      position: fixed;
      bottom: calc(60px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: var(--sans);
      font-size: clamp(9px, 0.9vw, 11px);
      font-weight: 400;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.15);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 3.0s ease;
    }
    #rt-note.visible { opacity: 1; }

    /* ── Tunnel vignette — departure transition ─────────────────────── */
    #tunnel {
      position: fixed; inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      /* drawn via JS radial-gradient */
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <!-- System identifier -->
  <div id="sys-label">
    <span>T—BANEN</span>
    <span class="sys-line" id="id-line"></span>
    <span class="sys-dot" id="id-dot"></span>
  </div>

  <!-- Boot status -->
  <div id="boot-status">INITIALISERER</div>

  <!-- Departure board — the threshold between outside and inside -->
  <div id="departure">
    <div id="dep-rule"></div>
    <div id="dep-inner">
      <div id="dep-sys">Oslo T-bane</div>
      <a id="dep-cta" href="/tbanen/app.html?enter">
        GÅ INN I NETTVERKET
        <span id="dep-arrow">→</span>
      </a>
      <div id="dep-count"></div>
    </div>
  </div>

  <!-- Realtime note -->
  <p id="rt-note">De bevegelige signalene representerer T-baner som beveger seg i Oslo akkurat nå.</p>

  <!-- Tunnel iris overlay (populated by JS) -->
  <div id="tunnel"></div>

  <script>
  // ═══════════════════════════════════════════════════════════════════
  //  T—BANEN — SPLASH V2 EXPERIMENT
  //  Concept: entering a metro system, not a website.
  //  Key differences from V1 splash:
  //   - Network is protagonist, not background
  //   - CTA is a departure sign at the bottom threshold
  //   - Entry = zoom toward central Oslo + tunnel iris close
  //   - No centered title-card composition
  // ═══════════════════════════════════════════════════════════════════

  const LC = { 1:'#5B9BD5', 2:'#E8751A', 3:'#8B5EA7', 4:'#C8102E', 5:'#3D9A5C' };

  // ── System state ─────────────────────────────────────────────────
  let systemSat    = 0;
  let targetSat    = 0;
  let systemOnline = false;
  let countReady   = false;

  let scanProgress = 0;
  const SCAN_SPEED = 0.10;
  let scanDir = 1;

  let nodeFlashes = [];
  let flashTimer  = 0;
  const FLASH_INTERVAL = 0.9;

  // ── Departure transition state ───────────────────────────────────
  let departing     = false;
  let zooming       = false;
  let zoomProgress  = 0;
  let tunnelProgress = 0;
  let speedMult     = 1;
  let targetSpeedMult = 1;

  // Base transform — stored after resize, used as lerp start during zoom
  let baseScale, baseOffsetX, baseOffsetY;
  let zoomTargetScale, zoomTargetOffsetX, zoomTargetOffsetY;

  // ── Color utilities ───────────────────────────────────────────────
  function hexToRgb(hex) {
    return [
      parseInt(hex.slice(1,3),16),
      parseInt(hex.slice(3,5),16),
      parseInt(hex.slice(5,7),16),
    ];
  }

  function saturateColor(hex, t) {
    const [r,g,b] = hexToRgb(hex);
    const lum = Math.round(0.299*r + 0.587*g + 0.114*b);
    return `rgb(${Math.round(lum+(r-lum)*t)},${Math.round(lum+(g-lum)*t)},${Math.round(lum+(b-lum)*t)})`;
  }

  function hexAlpha(hex, a, sat = 1) {
    const [r,g,b] = hexToRgb(hex);
    const lum = 0.299*r + 0.587*g + 0.114*b;
    return `rgba(${Math.round(lum+(r-lum)*sat)},${Math.round(lum+(g-lum)*sat)},${Math.round(lum+(b-lum)*sat)},${a})`;
  }

  // ── Station coordinates ───────────────────────────────────────────
  const COORDS = {
    majorstua:         [430, 310],
    nationaltheateret: [530, 310],
    stortinget:        [580, 310],
    jernbanetorget:    [630, 310],
    gronland:          [680, 310],
    toyen:             [730, 310],

    frognerseteren:    [120, 120],
    voksenkollen:      [154, 138],
    vettakollen:       [186, 158],
    besserud:          [216, 176],
    holmenkollen:      [244, 194],
    midtstuen:         [270, 210],
    skadalen:          [294, 224],
    voksenlia:         [316, 236],
    gullerasen:        [338, 246],
    graakammen:        [358, 256],
    slemdal:           [374, 266],
    ris:               [390, 276],
    gaustad:           [404, 288],
    lillevann:         [410, 296],
    vinderen:          [416, 300],
    steinerud:         [418, 306],
    froen:             [418, 310],

    osteraas:          [120, 238],
    lijordet:          [163, 238],
    eiksmarka:         [206, 238],
    ekraveien:         [249, 238],
    roa:               [292, 238],
    hovseter:          [324, 252],
    holmen:            [352, 264],
    makrellbekken:     [376, 276],
    smestad:           [396, 286],
    borgen:            [412, 296],

    kolsas:            [120, 548],
    hauger:            [156, 512],
    gjettum:           [190, 478],
    avlos:             [222, 446],
    haslum:            [252, 416],
    gjonnes:           [280, 388],
    bekkestua:         [306, 362],
    ringstabekk:       [330, 338],
    jar:               [352, 316],
    bjornsletta:       [366, 304],
    aasjordet:         [378, 298],
    ullernaasen:       [390, 294],
    montebello:        [400, 290],

    ullevaal:          [430, 120],
    forskningsparken:  [430, 152],
    blindern:          [430, 184],

    sognsvann:         [120, 162],
    kringsjaa:         [164, 162],
    holstein:          [208, 162],
    osthorn:           [252, 162],
    tasen:             [292, 162],
    berg:              [330, 162],

    nydalen:           [772, 120],
    storo:             [772, 178],
    sinsen:            [772, 222],
    carlberner:        [772, 266],
    loren:             [840, 222],

    okern:             [800, 100],
    hasle:             [813, 91],
    rislokka:          [826, 82],
    vollebekk:         [854, 68],
    linderud:          [882, 62],
    veitvet:           [910, 62],
    rodtvet:           [936, 68],
    kalbakken:         [960, 80],
    ammerud:           [982, 96],
    grorud:            [1002, 114],
    romsos:            [1018, 134],
    rommen:            [1030, 156],
    stovner:           [1038, 180],
    vestli:            [1042, 206],

    ensjo:             [820, 340],
    helsfyr:           [848, 370],
    brynseng:          [866, 400],
    hoyenhall:         [878, 428],
    manglerud:         [884, 456],
    ryen:              [884, 482],
    brattlikollen:     [876, 506],
    karlsrud:          [862, 528],
    lambertseter:      [840, 548],
    munkelia:          [812, 564],
    bergkrystallen:    [780, 578],

    hellerud:          [840, 310],
    tveita:            [874, 288],
    haugerud:          [904, 266],
    trosterud:         [930, 244],
    lindeberg:         [952, 222],
    furuset:           [970, 200],
    ellingsrudaasen:   [984, 176],

    godlia:            [852, 342],
    skoyenaasen:       [846, 370],
    oppsal:            [836, 398],
    ulsrud:            [822, 424],
    boler:             [804, 448],
    bogerud:           [782, 470],
    skullerud:         [756, 490],
    mortensrud:        [728, 508],
  };

  const LINE_SEGS = [
    { line:1, color:LC[1], ids:['frognerseteren','voksenkollen','vettakollen','besserud','holmenkollen','midtstuen','skadalen','voksenlia','gullerasen','graakammen','slemdal','ris','gaustad','lillevann','vinderen','steinerud','froen','majorstua','nationaltheateret','stortinget','jernbanetorget','gronland','toyen','ensjo','helsfyr','brynseng','hoyenhall','manglerud','ryen','brattlikollen','karlsrud','lambertseter','munkelia','bergkrystallen'] },
    { line:2, color:LC[2], ids:['osteraas','lijordet','eiksmarka','ekraveien','roa','hovseter','holmen','makrellbekken','smestad','borgen','majorstua','nationaltheateret','stortinget','jernbanetorget','gronland','toyen','ensjo','helsfyr','brynseng','hellerud','tveita','haugerud','trosterud','lindeberg','furuset','ellingsrudaasen'] },
    { line:3, color:LC[3], ids:['kolsas','hauger','gjettum','avlos','haslum','gjonnes','bekkestua','ringstabekk','jar','bjornsletta','aasjordet','ullernaasen','montebello','smestad','borgen','majorstua','nationaltheateret','stortinget','jernbanetorget','gronland','toyen','ensjo','helsfyr','brynseng','hellerud','godlia','skoyenaasen','oppsal','ulsrud','boler','bogerud','skullerud','mortensrud'] },
    { line:4, color:LC[4], ids:['bergkrystallen','munkelia','lambertseter','karlsrud','brattlikollen','ryen','manglerud','hoyenhall','brynseng','helsfyr','ensjo','toyen','gronland','jernbanetorget','stortinget','nationaltheateret','majorstua','blindern','forskningsparken','ullevaal','nydalen'] },
    { line:4, color:LC[4], ids:['nydalen','storo','sinsen','carlberner','toyen'] },
    { line:4, color:LC[4], ids:['nydalen','okern','hasle','rislokka','vollebekk','linderud','veitvet','rodtvet','kalbakken','ammerud','grorud','romsos','rommen','stovner','vestli'] },
    { line:4, color:LC[4], ids:['sinsen','loren'] },
    { line:5, color:LC[5], ids:['sognsvann','kringsjaa','holstein','osthorn','tasen','berg','ullevaal','forskningsparken','blindern','majorstua','nationaltheateret','stortinget','jernbanetorget','gronland','toyen','carlberner','sinsen','storo','nydalen','okern','hasle','rislokka','vollebekk','linderud','veitvet','rodtvet','kalbakken','ammerud','grorud','romsos','rommen','stovner','vestli'] },
    { line:5, color:LC[5], ids:['sinsen','loren'] },
  ];

  const SCAN_SEG_IDX = 0;

  const SEG_DEPTH = [
    0.55, 0.65, 0.58, 0.80, 0.95, 0.62, 0.28, 0.82, 0.28,
  ];

  const LINE_PHASE = { 1:0.0, 2:1.3, 3:2.6, 4:3.9, 5:5.2 };

  const TUNNEL_NODES = [
    'nationaltheateret','stortinget','jernbanetorget','gronland','toyen','carlberner','sinsen',
  ];

  // ── Canvas setup ──────────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const VB_W   = 1120, VB_H = 620;

  let scale, offsetX, offsetY;

  function resize() {
    canvas.width  = window.innerWidth  * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    const pad = 0.08;
    const scaleX = (window.innerWidth  * (1 - pad * 2)) / VB_W;
    const scaleY = (window.innerHeight * (1 - pad * 2)) / VB_H;
    scale   = Math.min(scaleX, scaleY) * devicePixelRatio;
    offsetX = (canvas.width  - VB_W * scale) / 2;
    offsetY = (canvas.height - VB_H * scale) / 2;
    storeBaseTransform();
  }

  function storeBaseTransform() {
    baseScale   = scale;
    baseOffsetX = offsetX;
    baseOffsetY = offsetY;
    // Zoom target: 2x zoom toward the central Oslo tunnel
    const [ntx, nty] = COORDS['nationaltheateret'];
    // Shift target slightly toward stortinget (the heart of the crossing)
    const [stx, sty] = COORDS['stortinget'];
    const cx = (ntx + stx) / 2;
    const cy = (nty + sty) / 2;
    zoomTargetScale   = scale * 2.1;
    zoomTargetOffsetX = canvas.width  / 2 - cx * zoomTargetScale;
    zoomTargetOffsetY = canvas.height / 2 - cy * zoomTargetScale;
  }

  function toCanvas(id) {
    const [x, y] = COORDS[id];
    return [offsetX + x * scale, offsetY + y * scale];
  }

  let segPoints = [];

  function buildSegPoints() {
    segPoints = LINE_SEGS.map(seg => ({
      ...seg,
      pts: seg.ids.map(id => COORDS[id] ? toCanvas(id) : null).filter(Boolean),
    }));
  }

  // ── Grain ─────────────────────────────────────────────────────────
  let grainPattern = null;

  function buildGrain() {
    const sz = 180;
    const off = document.createElement('canvas');
    off.width = off.height = sz;
    const octx = off.getContext('2d');
    const img = octx.createImageData(sz, sz);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() * 255 | 0;
      img.data[i] = img.data[i+1] = img.data[i+2] = v;
      img.data[i+3] = Math.random() * 18 | 0;
    }
    octx.putImageData(img, 0, 0);
    grainPattern = ctx.createPattern(off, 'repeat');
  }

  // ── Atmosphere ────────────────────────────────────────────────────
  function drawAtmosphere(hover = 0) {
    const w = canvas.width, h = canvas.height;
    const cx = w * 0.50, cy = h * 0.52;

    // Deeper vignette — darker corners feel more like underground tunnels
    const vig = ctx.createRadialGradient(cx, cy * 0.88, h * 0.05, cx, cy * 0.88, Math.max(w, h) * 0.85);
    vig.addColorStop(0,   'rgba(0,0,0,0)');
    vig.addColorStop(0.5, `rgba(0,0,0,${0.12 + (1 - systemSat) * 0.08})`);
    vig.addColorStop(1,   'rgba(0,0,0,0.80)');
    ctx.fillStyle = vig; ctx.globalAlpha = 1;
    ctx.fillRect(0, 0, w, h);

    // Warm amber glow around central Oslo — the heat of the underground
    const warmBase = (0.05 + hover * 0.03) * systemSat;
    if (warmBase > 0.001) {
      const warm = ctx.createRadialGradient(cx * 1.04, cy * 1.08, 0, cx * 1.04, cy * 1.08, h * (0.42 + hover * 0.1));
      warm.addColorStop(0,   `rgba(155, 125, 85, ${warmBase})`);
      warm.addColorStop(0.45, `rgba(115, 95,  65, ${warmBase * 0.35})`);
      warm.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = warm; ctx.globalAlpha = 1;
      ctx.fillRect(0, 0, w, h);
    }

    if (grainPattern) {
      ctx.fillStyle = grainPattern;
      ctx.globalAlpha = 0.028;
      ctx.fillRect(0, 0, w, h);
    }

    ctx.globalAlpha = 1;
  }

  // ── Network ───────────────────────────────────────────────────────
  function drawNetwork(t, hover = 0) {
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    const opacityBoost = 0.5 + 0.5 * systemSat;

    // Draw lines — slightly heavier during departure (feel them wake up)
    const departureBoost = zooming ? 1 + zoomProgress * 0.5 : 1;

    LINE_SEGS.forEach((seg, i) => {
      const pts = segPoints[i].pts;
      if (pts.length < 2) return;
      const depth  = SEG_DEPTH[i] ?? 0.6;
      const rhythm = 0.75 + 0.25 * Math.sin(t * 0.18 + LINE_PHASE[seg.line]);
      const alpha  = 0.088 * depth * rhythm * opacityBoost * departureBoost;
      const weight = (0.65 + 0.55 * depth) * scale;
      const color  = saturateColor(seg.color, systemSat);

      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k][0], pts[k][1]);
      ctx.strokeStyle = color;
      ctx.lineWidth   = weight;
      ctx.globalAlpha = alpha;
      ctx.stroke();
    });

    // Station dots
    const drawn = new Set();
    LINE_SEGS.forEach((seg, i) => {
      const depth = SEG_DEPTH[i] ?? 0.6;
      seg.ids.forEach(id => {
        if (drawn.has(id) || !COORDS[id]) return;
        drawn.add(id);
        const [cx, cy] = toCanvas(id);
        const r = (0.7 + 0.8 * depth) * scale;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle   = '#ffffff';
        ctx.globalAlpha = (0.04 + 0.08 * depth) * opacityBoost;
        ctx.fill();
      });
    });

    // Tunnel glow around central stations — warmer and stronger during departure
    if (systemSat > 0.05) {
      const tunnelBoost = 1 + zoomProgress * 0.6;
      TUNNEL_NODES.forEach((id, ti) => {
        if (!COORDS[id]) return;
        const [cx, cy] = toCanvas(id);
        const sat = systemSat;
        const gr1 = (90 + hover * 18) * scale;
        const oa1 = (0.038 + hover * 0.018) * sat * tunnelBoost;
        const grd1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, gr1);
        grd1.addColorStop(0, `rgba(200,182,155,${oa1})`);
        grd1.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(cx, cy, gr1, 0, Math.PI * 2);
        ctx.fillStyle = grd1; ctx.globalAlpha = 1;
        ctx.fill();
        if (ti >= 1 && ti <= 5) {
          const gr2 = 32 * scale;
          const oa2 = (0.055 + hover * 0.028) * sat * tunnelBoost;
          const grd2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, gr2);
          grd2.addColorStop(0, `rgba(220,198,165,${oa2})`);
          grd2.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(cx, cy, gr2, 0, Math.PI * 2);
          ctx.fillStyle = grd2; ctx.globalAlpha = 1;
          ctx.fill();
        }
      });
    }

    ctx.globalAlpha = 1;
  }

  // ── Loading activity ──────────────────────────────────────────────
  const ALL_STATION_IDS = [...new Set(LINE_SEGS.flatMap(s => s.ids))];
  const CENTRE_IDS = ['nationaltheateret','stortinget','jernbanetorget','gronland',
                      'toyen','majorstua','carlberner','sinsen','nydalen'];

  function spawnNodeFlash() {
    const pool = Math.random() < 0.6 ? CENTRE_IDS : ALL_STATION_IDS;
    const id   = pool[Math.floor(Math.random() * pool.length)];
    if (!COORDS[id]) return;
    const [x, y] = toCanvas(id);
    nodeFlashes.push({ x, y, t: 0 });
  }

  function interpolateAlongPath(pts, t) {
    if (!pts?.length) return null;
    if (pts.length === 1) return pts[0];
    t = Math.max(0, Math.min(1, t));
    const lens = [];
    let total = 0;
    for (let i = 1; i < pts.length; i++) {
      const dx = pts[i][0]-pts[i-1][0], dy = pts[i][1]-pts[i-1][1];
      total += Math.sqrt(dx*dx+dy*dy);
      lens.push(total);
    }
    const target = t * total;
    for (let i = 0; i < lens.length; i++) {
      if (target <= lens[i]) {
        const prev = i === 0 ? 0 : lens[i-1];
        const frac = (target - prev) / (lens[i] - prev);
        const a = pts[i], b = pts[i+1];
        return [a[0]+(b[0]-a[0])*frac, a[1]+(b[1]-a[1])*frac];
      }
    }
    return pts[pts.length-1];
  }

  function drawLoadingActivity(dt) {
    const loadingAlpha = Math.max(0, 1 - systemSat * 2.5);
    if (loadingAlpha < 0.01) return;

    // Scan pulse along L1
    const pts = segPoints[SCAN_SEG_IDX]?.pts;
    if (pts && pts.length >= 2) {
      const pos = interpolateAlongPath(pts, scanProgress);
      if (pos) {
        const [x, y] = pos;
        const r = 1.6 * scale;
        const grd = ctx.createRadialGradient(x, y, 0, x, y, r * 8);
        grd.addColorStop(0,   `rgba(205,215,225,${0.10 * loadingAlpha})`);
        grd.addColorStop(0.4, `rgba(185,200,215,${0.04 * loadingAlpha})`);
        grd.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(x, y, r * 8, 0, Math.PI * 2);
        ctx.fillStyle = grd; ctx.globalAlpha = 1;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle   = `rgba(218,226,234,${0.50 * loadingAlpha})`;
        ctx.globalAlpha = 1;
        ctx.fill();
        for (let i = 1; i <= 5; i++) {
          const frac = i / 6;
          const tp   = scanProgress - scanDir * 0.014 * frac;
          const tpos = interpolateAlongPath(pts, Math.max(0, Math.min(1, tp)));
          if (!tpos) continue;
          ctx.beginPath();
          ctx.arc(tpos[0], tpos[1], r * (1 - frac * 0.7), 0, Math.PI * 2);
          ctx.fillStyle   = `rgba(200,212,222,${0.18 * (1-frac) * loadingAlpha})`;
          ctx.globalAlpha = 1;
          ctx.fill();
        }
      }
    }

    // Node flashes
    nodeFlashes = nodeFlashes.filter(f => f.t < 1);
    nodeFlashes.forEach(f => {
      f.t += dt * 0.55;
      const ease = 1 - Math.pow(1 - f.t, 2);
      const maxR  = 22 * scale;
      const r     = maxR * ease;
      const alpha = (1 - f.t) * 0.13 * loadingAlpha;
      ctx.beginPath();
      ctx.arc(f.x, f.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(190,205,218,${alpha})`;
      ctx.lineWidth   = 0.8 * scale;
      ctx.globalAlpha = 1;
      ctx.stroke();
    });

    ctx.globalAlpha = 1;
  }

  // ── Entur realtime ────────────────────────────────────────────────
  const ENTUR_GQL    = 'https://api.entur.io/journey-planner/v3/graphql';
  const ENTUR_CLIENT = 'kiim-tbanen';
  const POLL_INTERVAL = 30000;
  const AVG_STATION_S = 90;

  const QUERY_STATIONS = [
    { nsr: 'NSR:StopPlace:58366', id: 'jernbanetorget' },
    { nsr: 'NSR:StopPlace:59768', id: 'frognerseteren' },
    { nsr: 'NSR:StopPlace:58243', id: 'bergkrystallen' },
    { nsr: 'NSR:StopPlace:59705', id: 'sognsvann'      },
    { nsr: 'NSR:StopPlace:58277', id: 'osteraas'       },
    { nsr: 'NSR:StopPlace:58284', id: 'kolsas'         },
    { nsr: 'NSR:StopPlace:58218', id: 'vestli'         },
    { nsr: 'NSR:StopPlace:58228', id: 'mortensrud'     },
    { nsr: 'NSR:StopPlace:58220', id: 'ellingsrudaasen'},
  ];

  const DEST_TO_ID = {
    'frognerseteren': 'frognerseteren', 'bergkrystallen': 'bergkrystallen',
    'ellingsrudåsen': 'ellingsrudaasen', 'østerås': 'osteraas',
    'kolsås': 'kolsas', 'mortensrud': 'mortensrud',
    'sognsvann': 'sognsvann', 'vestli': 'vestli',
    'helsfyr': 'helsfyr', 'ryen': 'ryen', 'brynseng': 'brynseng',
    'nydalen': 'nydalen', 'majorstua': 'majorstua',
    'nationaltheateret': 'nationaltheateret',
    'ringen via tøyen': 'toyen', 'ringen via majorstuen': 'majorstua',
  };

  const SEG_IDX_OF = LINE_SEGS.map(seg => {
    const m = {};
    seg.ids.forEach((id, i) => { m[id] = i; });
    return m;
  });

  function findInSegments(lineNum, stationId) {
    for (let si = 0; si < LINE_SEGS.length; si++) {
      if (LINE_SEGS[si].line !== lineNum) continue;
      const idx = SEG_IDX_OF[si][stationId];
      if (idx !== undefined) return { si, idx };
    }
    return null;
  }

  function buildQuery() {
    const startTime = new Date(Date.now() - 12 * 60 * 1000).toISOString();
    const fields = `estimatedCalls(numberOfDepartures:25 startTime:"${startTime}" timeRange:1500 whiteListedModes:[metro]){realtime expectedDepartureTime destinationDisplay{frontText} serviceJourney{id line{publicCode}}}`;
    const aliases = QUERY_STATIONS.map(({nsr,id}) => `${id}:stopPlace(id:"${nsr}"){${fields}}`).join('\n');
    return `{${aliases}}`;
  }

  let usingRealtime = false;
  const seenJourneys = new Set();

  async function fetchEnturTrains() {
    try {
      const res = await fetch(ENTUR_GQL, {
        method: 'POST',
        headers: { 'ET-Client-Name': ENTUR_CLIENT, 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: buildQuery() }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { data } = await res.json();
      if (!data) throw new Error('no data');

      const now = Date.now();
      const newTrains = [];
      seenJourneys.clear();
      let totalReal = 0;

      for (const qs of QUERY_STATIONS) {
        const stop = data[qs.id];
        if (!stop?.estimatedCalls?.length) continue;
        for (const call of stop.estimatedCalls) {
          if (!call.realtime) continue;
          const journeyId = call.serviceJourney?.id;
          if (!journeyId || seenJourneys.has(journeyId)) continue;
          const lineNum = parseInt(call.serviceJourney?.line?.publicCode);
          if (isNaN(lineNum) || lineNum < 1 || lineNum > 5) continue;
          const secsUntil = (new Date(call.expectedDepartureTime).getTime() - now) / 1000;
          if (secsUntil < -600 || secsUntil > 1200) continue;
          const qsLoc = findInSegments(lineNum, qs.id);
          if (!qsLoc) continue;
          const { si: segIdx, idx: qsIdx } = qsLoc;
          const seg = LINE_SEGS[segIdx];
          const nStations = seg.ids.length;
          const destText = (call.destinationDisplay?.frontText ?? '').toLowerCase();
          const destId   = DEST_TO_ID[destText];
          let dir = 0;
          if (destId) {
            const destLoc = findInSegments(lineNum, destId);
            if (destLoc?.si === segIdx) dir = destLoc.idx > qsIdx ? +1 : -1;
          }
          if (dir === 0 && qsIdx === 0)             dir = +1;
          if (dir === 0 && qsIdx === nStations - 1) dir = -1;
          if (dir === 0) dir = +1;
          const posIdx = qsIdx - dir * (secsUntil / AVG_STATION_S);
          const t = Math.max(0, Math.min(1, posIdx / (nStations - 1)));
          seenJourneys.add(journeyId);
          totalReal++;
          newTrains.push({
            segIdx, progress: t, targetProgress: t,
            color: LC[lineNum], pulse: Math.random() * Math.PI * 2,
            r: 2.5, real: true, dir, speed: 1/(nStations*AVG_STATION_S), journeyId,
          });
        }
      }

      if (totalReal === 0) return false;

      const incomingById = new Map(newTrains.map(t => [t.journeyId, t]));
      const existingById = new Map(trains.filter(t => t.real && t.journeyId).map(t => [t.journeyId, t]));
      for (const [jid, inc] of incomingById) {
        const ex = existingById.get(jid);
        if (ex) { ex.targetProgress = inc.targetProgress; ex.dir = inc.dir; ex.speed = inc.speed; }
      }
      for (const [jid, inc] of incomingById) {
        if (!existingById.has(jid)) { inc.pulse = 0; trains.push(inc); }
      }
      trains = trains.filter(t => !t.real || !t.journeyId || incomingById.has(t.journeyId));
      usingRealtime = true;
      return true;
    } catch(e) {
      return false;
    }
  }

  let trains = [];

  function spawnSimulatedTrains() {
    trains = [];
    LINE_SEGS.forEach((seg, segIdx) => {
      if (seg.ids.length < 3) return;
      const count = seg.ids.length > 20 ? 3 : seg.ids.length > 10 ? 2 : 1;
      for (let i = 0; i < count; i++) {
        trains.push({
          segIdx, progress: i / count, targetProgress: null,
          speed: 0.0018 + Math.random() * 0.0008,
          dir: Math.random() > 0.5 ? 1 : -1,
          color: seg.color, pulse: Math.random() * Math.PI * 2,
          r: 2.2 + Math.random() * 0.8, real: false,
        });
      }
    });
  }

  // ── Render loop ───────────────────────────────────────────────────
  let lastTime = 0, globalTime = 0;
  let gatewayHover = 0, gatewayOver = false;
  const tunnelEl = document.getElementById('tunnel');

  function render(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    globalTime += dt;

    // Saturation lerp
    systemSat += (targetSat - systemSat) * Math.min(dt * 0.32, 1);

    // Speed multiplier lerp (accelerates during departure)
    speedMult += (targetSpeedMult - speedMult) * Math.min(dt * 2.8, 1);

    // Scan pulse
    scanProgress += SCAN_SPEED * dt * scanDir;
    if (scanProgress >= 1) { scanProgress = 1; scanDir = -1; }
    if (scanProgress <= 0) { scanProgress = 0; scanDir =  1; }

    if (!systemOnline || systemSat < 0.8) {
      flashTimer += dt;
      if (flashTimer >= FLASH_INTERVAL) { flashTimer = 0; spawnNodeFlash(); }
    }

    gatewayHover += ((gatewayOver ? 1 : 0) - gatewayHover) * Math.min(dt * 2.2, 1);

    // Zoom toward central Oslo during departure
    if (zooming) {
      zoomProgress = Math.min(1, zoomProgress + dt / 0.7);
      const ease = 1 - Math.pow(1 - zoomProgress, 3);

      scale   = baseScale   + (zoomTargetScale   - baseScale)   * ease;
      offsetX = baseOffsetX + (zoomTargetOffsetX - baseOffsetX) * ease;
      offsetY = baseOffsetY + (zoomTargetOffsetY - baseOffsetY) * ease;
      buildSegPoints();

      // Tunnel iris closing: transparent center shrinks as darkness closes in
      tunnelProgress = Math.min(1, tunnelProgress + dt / 0.65);
      const te = 1 - Math.pow(1 - tunnelProgress, 2.5);
      const innerPct = Math.max(0, Math.round(46 - te * 48));
      const outerPct = innerPct + 22;
      tunnelEl.style.background =
        `radial-gradient(ellipse at center, transparent ${innerPct}%, rgba(0,0,0,0.97) ${outerPct}%)`;
      tunnelEl.style.opacity = String(Math.min(te * 1.1, 1));
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawAtmosphere(gatewayHover);
    drawNetwork(globalTime, gatewayHover);
    drawLoadingActivity(dt);

    // Train signals
    trains.forEach(train => {
      train.pulse += dt * 0.8;
      train.progress += train.speed * speedMult * dt * train.dir;
      if (train.real) {
        if (train.targetProgress !== null)
          train.progress += (train.targetProgress - train.progress) * dt * 0.05;
        train.progress = Math.max(0, Math.min(1, train.progress));
      } else {
        if (train.progress > 1) { train.progress = 1; train.dir = -1; }
        if (train.progress < 0) { train.progress = 0; train.dir =  1; }
      }

      const trainAlpha = systemSat;
      if (trainAlpha < 0.02) return;

      const pts = segPoints[train.segIdx]?.pts;
      if (!pts || pts.length < 2) return;
      const pos = interpolateAlongPath(pts, train.progress);
      if (!pos) return;

      const [x, y] = pos;
      const pulse = (0.7 + 0.3 * Math.sin(train.pulse)) * (1 + gatewayHover * 0.28);
      const r     = train.r * scale;
      const color = train.color;

      // Trail
      for (let i = 1; i <= 5; i++) {
        const frac = i / 6;
        const tp   = train.progress - train.dir * 0.022 * frac;
        const tpos = interpolateAlongPath(pts, Math.max(0, Math.min(1, tp)));
        if (!tpos) continue;
        ctx.beginPath();
        ctx.arc(tpos[0], tpos[1], Math.max(r*(1-frac*0.55), 0.5), 0, Math.PI*2);
        ctx.fillStyle   = color;
        ctx.globalAlpha = 0.22 * pulse * (1-frac) * trainAlpha;
        ctx.fill();
      }

      // Bloom
      const bloom = ctx.createRadialGradient(x, y, 0, x, y, r*5.5);
      bloom.addColorStop(0,   hexAlpha(color, 0.14*pulse, systemSat));
      bloom.addColorStop(0.4, hexAlpha(color, 0.06*pulse, systemSat));
      bloom.addColorStop(1,   hexAlpha(color, 0, systemSat));
      ctx.beginPath();
      ctx.arc(x, y, r*5.5, 0, Math.PI*2);
      ctx.fillStyle = bloom; ctx.globalAlpha = trainAlpha;
      ctx.fill();

      // Tight glow
      const grd = ctx.createRadialGradient(x, y, 0, x, y, r*2.5);
      grd.addColorStop(0,   hexAlpha(color, 0.38*pulse, systemSat));
      grd.addColorStop(0.5, hexAlpha(color, 0.15*pulse, systemSat));
      grd.addColorStop(1,   hexAlpha(color, 0, systemSat));
      ctx.beginPath();
      ctx.arc(x, y, r*2.5, 0, Math.PI*2);
      ctx.fillStyle = grd; ctx.globalAlpha = trainAlpha;
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle   = color;
      ctx.globalAlpha = 0.82 * pulse * trainAlpha;
      ctx.fill();

      // Specular
      ctx.beginPath();
      ctx.arc(x, y, r*0.42, 0, Math.PI*2);
      ctx.fillStyle   = '#ffffff';
      ctx.globalAlpha = 0.30 * pulse * trainAlpha;
      ctx.fill();

      ctx.globalAlpha = 1;
    });

    requestAnimationFrame(render);
  }

  // ── Boot sequence ─────────────────────────────────────────────────
  const STATUS_MSGS = ['INITIALISERER','LASTER NETTVERKET','HENTER SANNTIDSDATA','SYSTEMET STARTER'];
  let statusIdx = 0;
  const statusEl  = document.getElementById('boot-status');
  const countEl   = document.getElementById('dep-count');
  const departureEl = document.getElementById('departure');

  async function bootSystem() {
    const msgTimer = setInterval(() => {
      statusIdx = (statusIdx + 1) % STATUS_MSGS.length;
      if (statusEl) statusEl.textContent = STATUS_MSGS[statusIdx];
    }, 1600);

    const BOOT_TIMEOUT = 5000;

    const stationsLoad = fetch('/tbanen/data/stations.json')
      .then(r => r.json())
      .then(data => {
        const total = data.stations.length;
        const done  = data.stations.filter(s => s.image).length;
        countReady = true;
        if (countEl) countEl.textContent = `${done} / ${total} stasjoner`;
      })
      .catch(() => {
        if (countEl) countEl.textContent = '5 linjer · 101 stasjoner';
        countReady = true;
      });

    const enturLoad = fetchEnturTrains()
      .then(ok => { if (!ok) spawnSimulatedTrains(); })
      .catch(() => { spawnSimulatedTrains(); });

    const imageLoad = new Promise(res => {
      const img = new Image();
      img.onload = img.onerror = () => res();
      img.src = '/tbanen/images/stations/nationaltheateret.jpg';
    });

    const timeout = new Promise(res => setTimeout(res, BOOT_TIMEOUT));

    await Promise.race([Promise.all([enturLoad, imageLoad]), timeout]);

    clearInterval(msgTimer);
    goOnline();

    stationsLoad.then(() => {
      if (systemOnline && countEl && countReady) countEl.classList.add('ready');
    });

    setInterval(async () => {
      const ok = await fetchEnturTrains();
      if (!ok && !usingRealtime) spawnSimulatedTrains();
    }, POLL_INTERVAL);
  }

  function goOnline() {
    systemOnline = true;
    targetSat = 1;

    if (statusEl) statusEl.classList.add('fade-out');

    setTimeout(() => {
      departureEl.classList.add('online');
      setTimeout(() => {
        if (countEl && countReady) countEl.classList.add('ready');
      }, 900);
    }, 500);

    // Realtime note — arrives late, as a discovery
    setTimeout(() => {
      const note = document.getElementById('rt-note');
      if (note) note.classList.add('visible');
    }, 4500);
  }

  // ── Identity dot cycling ──────────────────────────────────────────
  const LINE_COLORS = Object.values(LC);
  let colorIdx = 4;

  function cycleIdentityColor() {
    colorIdx = (colorIdx + 1) % LINE_COLORS.length;
    const c = LINE_COLORS[colorIdx];
    const dot  = document.getElementById('id-dot');
    const line = document.getElementById('id-line');
    if (dot)  dot.style.backgroundColor = c;
    if (line) line.style.color = c;
  }

  cycleIdentityColor();
  setInterval(cycleIdentityColor, 7200);

  // ── Departure — the actual entry into the network ─────────────────
  // Zooms toward central Oslo + tunnel iris closes + fade to black
  function startDeparture() {
    if (departing || !systemOnline) return;
    departing = true;

    // Hide the departure board and system label
    departureEl.style.transition = 'opacity 0.3s ease';
    departureEl.style.opacity = '0';
    document.getElementById('sys-label').style.opacity = '0';
    document.getElementById('rt-note').style.opacity = '0';

    // Start zoom and tunnel
    zooming = true;
    targetSpeedMult = 3.8;

    // Fade to black and navigate after zoom completes
    setTimeout(() => {
      document.body.style.transition = 'opacity 0.40s ease';
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = '/tbanen/app.html?enter'; }, 380);
    }, 650);
  }

  // ── Gateway hover ─────────────────────────────────────────────────
  const ctaEl = document.getElementById('dep-cta');
  ctaEl.addEventListener('mouseenter', () => { gatewayOver = true; });
  ctaEl.addEventListener('mouseleave', () => { gatewayOver = false; });

  // CTA intercept
  ctaEl.addEventListener('click', e => {
    e.preventDefault();
    startDeparture();
  });

  // Click anywhere
  document.body.addEventListener('click', e => {
    if (e.target.closest('#dep-cta')) return;
    startDeparture();
  });

  // ── bfcache ───────────────────────────────────────────────────────
  window.addEventListener('pageshow', e => { if (e.persisted) location.reload(); });

  // ── Start ─────────────────────────────────────────────────────────
  window.addEventListener('resize', () => { resize(); buildSegPoints(); buildGrain(); });

  resize();
  buildSegPoints();
  buildGrain();
  spawnSimulatedTrains();

  requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(render); });
  bootSystem();
  </script>

</body>
